services:
  mysqldb:
    image: mysql:8.0
    container_name: mysqldb
    environment:
      - MYSQL_DATABASE=notedb
      - MYSQL_ROOT_PASSWORD=nitesh123
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  notepad-api:
    build: .
    container_name: notepad-api
    ports:
      - "8090:8090"
    environment:
      - DB_URL=jdbc:mysql://mysqldb:3306/notedb
      - DB_USERNAME=root
      - DB_PASSWORD=nitesh123
      - JWT_SECRET=v9y$B&E)H@McQfTjWnZr4u7x!A%C*F-JaNdRgUkXp2s5v8y/B?E(G+KbPeShVmYp
      - JWT_EXPIRATION=3600000
    depends_on:
      mysqldb:
        condition: service_healthy
