services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: notedb
      MYSQL_ROOT_PASSWORD: nitesh123
    ports:
      - "3306:3306"

  app:
    build: .
    ports:
      - "8090:8090"
    environment:
      - DB_URL=jdbc:mysql://db:3306/notedb
      - DB_USERNAME=root
      - DB_PASSWORD=nitesh123
    depends_on:
      - db
